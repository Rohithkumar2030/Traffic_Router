apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aegis-ingress-v2
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "10" # 10% Traffic to v2
    nginx.ingress.kubernetes.io/affinity: "cookie" # Sticky Sessions
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: aegis-v2-svc
            port:
              number: 80