apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: router-ingress-v1
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "70" # 70% Traffic to v1
    nginx.ingress.kubernetes.io/affinity: "cookie" # Sticky Sessions
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: router-v1-svc
            port:
              number: 80